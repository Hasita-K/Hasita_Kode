<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INDEX — flashcard study sets</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
         :root {
            --bg: #F5F8FC;
            --grid: rgba(46, 94, 170, 0.07);
            --ink: #16223D;
            --ink-soft: #54607A;
            --blue: #2E5EAA;
            --blue-dark: #1F4480;
            --blue-pale: #E4ECF8;
            --green: #2F8F5B;
            --green-pale: #E3F3EA;
            --coral: #D6553C;
            --coral-pale: #FBE7E2;
            --amber: #C9862E;
            --amber-pale: #FAF0E2;
            --card-bg: #FFFEFB;
            --card-line: #DCE2EC;
            --shadow: rgba(22, 34, 61, 0.14);
            --radius: 14px;
        }
        
        * {
            box-sizing: border-box;
        }
        
        html,
        body {
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            color: var(--ink);
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 28px 28px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        button,
        input,
        textarea,
        select {
            font-family: inherit;
        }
        
        button {
            cursor: pointer;
        }
        
         :focus-visible {
            outline: 2px solid var(--blue);
            outline-offset: 2px;
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }
        
        .shell {
            max-width: 880px;
            margin: 0 auto;
            padding: 28px 20px 64px;
        }
        
        .eyebrow {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11.5px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--blue);
            font-weight: 600;
        }
        
        .topbar {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .brand {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: .04em;
        }
        
        .brand small {
            display: block;
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 400;
            font-size: 13px;
            color: var(--ink-soft);
            letter-spacing: 0;
            margin-top: 2px;
        }
        
        .btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12.5px;
            font-weight: 600;
            letter-spacing: .04em;
            text-transform: uppercase;
            border-radius: 8px;
            border: 1px solid var(--card-line);
            background: #fff;
            color: var(--ink);
            padding: 9px 14px;
            transition: transform .12s ease, box-shadow .12s ease;
        }
        
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px var(--shadow);
        }
        
        .btn-primary {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }
        
        .btn-primary:hover {
            background: var(--blue-dark);
        }
        
        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--ink-soft);
            padding: 6px 8px;
        }
        
        .btn-danger {
            background: var(--coral);
            border-color: var(--coral);
            color: #fff;
        }
        
        .btn-sm {
            font-size: 11px;
            padding: 6px 10px;
        }
        
        .btn[disabled] {
            opacity: .45;
            cursor: default;
            transform: none;
            box-shadow: none;
        }
        
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .spacer {
            flex: 1;
        }
        /* ---- ruled index-card motif ---- */
        
        .ruled {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-line);
            border-radius: var(--radius);
            box-shadow: 0 8px 22px var(--shadow);
            overflow: hidden;
        }
        
        .ruled::before {
            /* horizontal rule */
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 34px;
            height: 1px;
            background: rgba(214, 85, 60, .55);
        }
        
        .ruled::after {
            /* vertical margin rule */
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 30px;
            width: 1px;
            background: rgba(46, 94, 170, .30);
        }
        /* ---- home ---- */
        
        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 18px;
        }
        
        .set-card {
            padding: 18px 16px 14px 40px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .set-card__title {
            font-weight: 600;
            font-size: 16.5px;
            padding-top: 2px;
            word-break: break-word;
        }
        
        .set-card__meta {
            font-size: 12.5px;
            color: var(--ink-soft);
        }
        
        .new-set-tile {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            border: 2px dashed var(--card-line);
            border-radius: var(--radius);
            color: var(--blue);
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: .04em;
            text-transform: uppercase;
            background: transparent;
        }
        
        .new-set-tile:hover {
            background: var(--blue-pale);
        }
        
        .confirm-row {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 12px;
            color: var(--ink-soft);
        }
        
        .ruler {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        
        .tick {
            width: 7px;
            height: 14px;
            border-radius: 2px;
            background: #D8DEE8;
        }
        
        .tick.lvl1 {
            background: var(--amber);
        }
        
        .tick.lvl2 {
            background: var(--green);
        }
        
        .tick.bad {
            background: var(--coral);
        }
        
        .ruler-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--ink-soft);
            margin-top: 4px;
        }
        /* ---- editor ---- */
        
        .field {
            margin-bottom: 18px;
        }
        
        .field label {
            display: block;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 6px;
        }
        
        .field input[type=text],
        .field textarea {
            width: 100%;
            border: 1px solid var(--card-line);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14.5px;
            background: #fff;
            color: var(--ink);
        }
        
        .field textarea {
            min-height: 96px;
            resize: vertical;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
        }
        
        .delim-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 10px;
            align-items: center;
        }
        
        .delim-row select {
            border: 1px solid var(--card-line);
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 12.5px;
            background: #fff;
        }
        
        .delim-row .lbl {
            font-size: 12px;
            color: var(--ink-soft);
        }
        
        .import-status {
            font-size: 12.5px;
            color: var(--green);
            margin-top: 8px;
            min-height: 16px;
        }
        
        .card-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        
        .card-row input {
            border: 1px solid var(--card-line);
            border-radius: 7px;
            padding: 8px 10px;
            font-size: 13.5px;
            width: 100%;
        }
        
        .card-row .rownum {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--ink-soft);
        }
        
        @media (max-width:560px) {
            .card-row {
                grid-template-columns: 1fr;
            }
        }
        /* ---- study / flashcards ---- */
        
        .flip-card {
            width: 100%;
            max-width: 560px;
            height: 300px;
            perspective: 1300px;
            margin: 18px auto;
            cursor: pointer;
        }
        
        .flip-card__inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform .5s cubic-bezier(.2, .8, .2, 1);
            transform-style: preserve-3d;
        }
        
        .flip-card.flipped .flip-card__inner {
            transform: rotateY(180deg);
        }
        
        .flip-card__face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 32px;
            text-align: center;
        }
        
        .flip-card__face--back {
            transform: rotateY(180deg);
        }
        
        .flip-card__text {
            font-size: 19px;
            line-height: 1.45;
            max-height: 170px;
            overflow: auto;
        }
        
        .flip-hint {
            text-align: center;
            font-size: 11.5px;
            color: var(--ink-soft);
            font-family: 'IBM Plex Mono', monospace;
        }
        /* ---- learn ---- */
        
        .prompt-card {
            padding: 30px 28px 26px 44px;
            max-width: 600px;
            margin: 18px auto;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
        }
        
        .prompt-text {
            font-size: 19px;
            line-height: 1.5;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        @media (max-width:560px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .option-btn {
            text-align: left;
            padding: 13px 14px;
            border-radius: 10px;
            border: 1px solid var(--card-line);
            background: #fff;
            font-size: 14px;
            color: var(--ink);
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        
        .option-btn .opt-letter {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            color: var(--blue);
            flex: 0 0 auto;
        }
        
        .option-btn:hover {
            background: var(--blue-pale);
        }
        
        .option-btn.correct {
            background: var(--green-pale);
            border-color: var(--green);
        }
        
        .option-btn.incorrect {
            background: var(--coral-pale);
            border-color: var(--coral);
        }
        
        .option-btn[disabled] {
            cursor: default;
        }
        
        .option-btn:not([disabled]):hover {
            transform: translateY(-1px);
        }
        
        .answer-reveal {
            max-width: 600px;
            margin: 14px auto 0;
            background: var(--green-pale);
            border: 1px solid var(--green);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 15px;
        }
        
        .answer-reveal .eyebrow {
            color: var(--green);
        }
        
        .feedback-banner {
            max-width: 600px;
            margin: 14px auto 0;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13.5px;
            font-weight: 600;
        }
        
        .feedback-banner.ok {
            background: var(--green-pale);
            color: var(--green);
        }
        
        .feedback-banner.bad {
            background: var(--coral-pale);
            color: var(--coral);
        }
        
        .center-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 480px;
            margin: 18px auto;
            text-align: center;
        }
        
        .stat {
            background: #fff;
            border: 1px solid var(--card-line);
            border-radius: 10px;
            padding: 14px 8px;
        }
        
        .stat .num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--blue);
        }
        
        .stat .lbl {
            font-size: 11px;
            color: var(--ink-soft);
            text-transform: uppercase;
            letter-spacing: .06em;
        }
        
        .radio-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .radio-pill {
            border: 1px solid var(--card-line);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            background: #fff;
        }
        
        .radio-pill.active {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--ink-soft);
        }
        
        .empty-state .big {
            font-size: 34px;
            margin-bottom: 8px;
        }
        
        h2.view-title {
            font-size: 20px;
            margin: 0 0 4px;
        }
        
        .view-sub {
            color: var(--ink-soft);
            font-size: 13.5px;
            margin: 0 0 22px;
        }
    </style>
</head>

<body>
    <div class="shell" id="app">
        <div class="empty-state">Loading your sets…</div>
    </div>

    <script>
        (function() {
            "use strict";

            /* ---------------- helpers ---------------- */
            function uid() {
                return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
            }

            function shuffle(arr) {
                const a = arr.slice();
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function esc(s) {
                return (s === undefined || s === null ? '' : String(s))
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            }

            function nowISO() {
                return new Date().toISOString();
            }

            /* ---------------- storage ---------------- */
            async function loadIndex() {
                try {
                    const res = await window.storage.get('sets-index', false);
                    return res ? JSON.parse(res.value) : [];
                } catch (e) {
                    return [];
                }
            }
            async function saveIndex(idx) {
                try {
                    await window.storage.set('sets-index', JSON.stringify(idx), false);
                } catch (e) {
                    console.error('saveIndex failed', e);
                }
            }
            async function loadSetData(id) {
                try {
                    const res = await window.storage.get('set:' + id, false);
                    return res ? JSON.parse(res.value) : null;
                } catch (e) {
                    return null;
                }
            }
            async function saveSetData(setObj) {
                try {
                    await window.storage.set('set:' + setObj.id, JSON.stringify(setObj), false);
                } catch (e) {
                    console.error('saveSetData failed', e);
                }
            }
            async function deleteSetData(id) {
                try {
                    await window.storage.delete('set:' + id, false);
                } catch (e) {}
            }

            /* ---------------- state ---------------- */
            const state = {
                view: 'home', // home | edit | study | learn
                sets: [], // index list
                storageOk: true,
                confirmDelete: null,
                confirmReset: null,
                edit: null, // {id|null, name, cards:[{id,term,def}]}
                study: null,
                learn: null,
            };

            const app = document.getElementById('app');

            function render() {
                app.innerHTML = renderCurrentView();
            }

            function renderCurrentView() {
                if (state.view === 'edit') return renderEdit();
                if (state.view === 'study') return renderStudy();
                if (state.view === 'learn') return renderLearn();
                return renderHome();
            }

            /* ---------------- HOME ---------------- */
            function masteryCounts(setData) {
                const cards = setData.cards || [];
                const mastery = setData.mastery || {};
                let l0 = 0,
                    l1 = 0,
                    l2 = 0;
                cards.forEach(c => {
                    const lv = mastery[c.id] || 0;
                    if (lv >= 2) l2++;
                    else if (lv === 1) l1++;
                    else l0++;
                });
                return {
                    l0,
                    l1,
                    l2,
                    total: cards.length
                };
            }

            function miniRuler(setData) {
                const cards = setData.cards || [];
                const mastery = setData.mastery || {};
                if (!cards.length) return '<div class="ruler-label">No cards yet</div>';
                const ticks = cards.map(c => {
                    const lv = mastery[c.id] || 0;
                    const cls = lv >= 2 ? 'lvl2' : (lv === 1 ? 'lvl1' : '');
                    return '<div class="tick ' + cls + '"></div>';
                }).join('');
                const m = masteryCounts(setData);
                return '<div class="ruler">' + ticks + '</div><div class="ruler-label">' + m.l2 + ' mastered · ' + m.l1 + ' learning · ' + m.l0 + ' new</div>';
            }

            function renderHome() {
                let body;
                if (!state.sets.length) {
                    body = '<div class="empty-state"><div class="big">🗂️</div>' +
                        '<div>No sets yet. Paste in a Quizlet export, or build your own.</div></div>';
                } else {
                    body = '<div class="home-grid">' + state.sets.map(renderSetCard).join('') + renderNewTile() + '</div>';
                }
                return '' +
                    '<div class="topbar">' +
                    '<div class="brand">INDEX<small>study sets, drafted and drilled</small></div>' +
                    (state.sets.length ? '' : '') +
                    '</div>' +
                    body +
                    (state.sets.length ? '<div style="margin-top:18px;"><button class="btn" data-action="new-set">+ New set</button></div>' : '<div style="margin-top:18px; text-align:center;"><button class="btn btn-primary" data-action="new-set">+ Create your first set</button></div>') +
                    (state.storageOk ? '' : '<div class="view-sub" style="margin-top:18px;color:var(--coral);">Heads up — saving isn\'t working right now, so progress may not persist between sessions.</div>');
            }

            function renderNewTile() {
                return '<button class="new-set-tile" data-action="new-set">+ New set</button>';
            }

            function renderSetCard(s) {
                const ruler = miniRuler(s);
                const deleting = state.confirmDelete === s.id;
                const resetting = state.confirmReset === s.id;
                let actionsRow;
                if (deleting) {
                    actionsRow = '<div class="confirm-row">Delete “' + esc(s.name) + '” for good? ' +
                        '<button class="btn btn-danger btn-sm" data-action="delete-confirm" data-id="' + s.id + '">Yes, delete</button>' +
                        '<button class="btn btn-ghost btn-sm" data-action="delete-cancel">Cancel</button></div>';
                } else if (resetting) {
                    actionsRow = '<div class="confirm-row">Reset progress on “' + esc(s.name) + '”? ' +
                        '<button class="btn btn-danger btn-sm" data-action="reset-confirm" data-id="' + s.id + '">Yes, reset</button>' +
                        '<button class="btn btn-ghost btn-sm" data-action="reset-cancel">Cancel</button></div>';
                } else {
                    actionsRow = '<div class="row">' +
                        '<button class="btn btn-ghost btn-sm" data-action="edit-set" data-id="' + s.id + '">Edit</button>' +
                        '<button class="btn btn-ghost btn-sm" data-action="reset-ask" data-id="' + s.id + '">Reset</button>' +
                        '<button class="btn btn-ghost btn-sm" data-action="delete-ask" data-id="' + s.id + '">Delete</button>' +
                        '</div>';
                }
                return '<div class="ruled set-card">' +
                    '<div class="set-card__title">' + esc(s.name) + '</div>' +
                    '<div class="set-card__meta">' + (s.count || 0) + ' card' + (s.count === 1 ? '' : 's') + '</div>' +
                    ruler +
                    '<div class="row" style="margin-top:4px;">' +
                    '<button class="btn btn-primary btn-sm" data-action="study-set" data-id="' + s.id + '">Flashcards</button>' +
                    '<button class="btn btn-sm" data-action="learn-set" data-id="' + s.id + '">Learn</button>' +
                    '</div>' +
                    actionsRow +
                    '</div>';
            }

            /* ---------------- EDIT ---------------- */
            function startNewSet() {
                state.edit = {
                    id: null,
                    name: '',
                    cards: [{
                        id: uid(),
                        term: '',
                        def: ''
                    }],
                    mastery: {}
                };
                state.confirmDelete = null;
                state.confirmReset = null;
                state.view = 'edit';
                render();
            }
            async function startEditSet(id) {
                const data = await loadSetData(id);
                if (!data) {
                    render();
                    return;
                }
                state.edit = {
                    id: data.id,
                    name: data.name,
                    cards: (data.cards || []).map(c => ({
                        id: c.id,
                        term: c.term,
                        def: c.def
                    })),
                    mastery: data.mastery || {}
                };
                if (!state.edit.cards.length) state.edit.cards.push({
                    id: uid(),
                    term: '',
                    def: ''
                });
                state.importStatus = '';
                state.view = 'edit';
                render();
            }

            function renderEdit() {
                const e = state.edit;
                const rows = e.cards.map((c, i) =>
                    '<div class="card-row">' +
                    '<input type="text" placeholder="Term" value="' + esc(c.term) + '" data-field="term" data-idx="' + i + '" />' +
                    '<input type="text" placeholder="Definition" value="' + esc(c.def) + '" data-field="def" data-idx="' + i + '" />' +
                    '<button class="btn btn-ghost btn-sm" data-action="remove-card" data-idx="' + i + '" title="Remove">✕</button>' +
                    '</div>'
                ).join('');

                return '' +
                    '<div class="topbar"><div class="brand">INDEX</div>' +
                    '<button class="btn btn-ghost" data-action="back-home">← Back</button>' +
                    '</div>' +
                    '<h2 class="view-title">' + (e.id ? 'Edit set' : 'New set') + '</h2>' +
                    '<div class="view-sub">Paste cards in, or build the list by hand.</div>' +

                    '<div class="field">' +
                    '<label for="set-name-input">Set name</label>' +
                    '<input type="text" id="set-name-input" data-field="set-name" placeholder="e.g. CIS3360 Security Terms" value="' + esc(e.name) + '" />' +
                    '</div>' +

                    '<div class="ruled" style="padding:18px 18px 18px 38px; margin-bottom:24px;">' +
                    '<div class="eyebrow" style="margin-bottom:8px;">Bulk import</div>' +
                    '<textarea id="import-text" placeholder="Paste rows here — e.g. from Quizlet: Export → Copy text.\nOne card per line.\nterm[TAB]definition"></textarea>' +
                    '<div class="delim-row">' +
                    '<span class="lbl">Between term &amp; definition:</span>' +
                    '<select id="sep-field">' +
                    '<option value="tab">Tab (Quizlet default)</option>' +
                    '<option value="comma">Comma</option>' +
                    '<option value="semicolon">Semicolon</option>' +
                    '</select>' +
                    '<span class="lbl">Between cards:</span>' +
                    '<select id="sep-card">' +
                    '<option value="newline">New line</option>' +
                    '<option value="blank">Blank line</option>' +
                    '</select>' +
                    '<button class="btn btn-sm" data-action="parse-import">Add cards</button>' +
                    '</div>' +
                    '<div class="import-status">' + esc(state.importStatus || '') + '</div>' +
                    '</div>' +

                    '<div class="eyebrow" style="margin-bottom:10px;">Cards (' + e.cards.length + ')</div>' +
                    '<div id="cards-list">' + rows + '</div>' +
                    '<button class="btn btn-sm" data-action="add-card" style="margin-top:6px;">+ Add card</button>' +

                    '<div class="row" style="margin-top:30px;">' +
                    '<button class="btn btn-primary" data-action="save-set">Save set</button>' +
                    '<button class="btn btn-ghost" data-action="cancel-edit">Cancel</button>' +
                    '<div class="spacer"></div>' +
                    '</div>';
            }

            function parseImport() {
                const ta = document.getElementById('import-text');
                const sepFieldSel = document.getElementById('sep-field').value;
                const sepCardSel = document.getElementById('sep-card').value;
                const text = ta.value;
                if (!text.trim()) {
                    state.importStatus = 'Paste something in first.';
                    render();
                    return;
                }

                const fieldSep = sepFieldSel === 'tab' ? '\t' : (sepFieldSel === 'comma' ? ',' : ';');
                let chunks;
                if (sepCardSel === 'blank') {
                    chunks = text.split(/\n\s*\n/);
                } else {
                    chunks = text.split('\n');
                }

                let added = 0,
                    skipped = 0;
                chunks.forEach(line => {
                    const trimmed = line.trim();
                    if (!trimmed) return;
                    const idx = trimmed.indexOf(fieldSep);
                    if (idx === -1) {
                        skipped++;
                        return;
                    }
                    const term = trimmed.slice(0, idx).trim();
                    const def = trimmed.slice(idx + fieldSep.length).trim();
                    if (!term || !def) {
                        skipped++;
                        return;
                    }
                    state.edit.cards.push({
                        id: uid(),
                        term,
                        def
                    });
                    added++;
                });
                // drop one leading fully-empty placeholder row if present
                state.edit.cards = state.edit.cards.filter(c => (c.term || c.def) || state.edit.cards.length === 1);

                state.importStatus = added ? ('Added ' + added + ' card' + (added === 1 ? '' : 's') + (skipped ? (' · skipped ' + skipped + ' line' + (skipped === 1 ? '' : 's') + " that didn't match the separator") : '.')) : ('Nothing added — check your separator settings.');
                render();
            }

            function addCardRow() {
                state.edit.cards.push({
                    id: uid(),
                    term: '',
                    def: ''
                });
                render();
                const inputs = document.querySelectorAll('#cards-list .card-row');
                const last = inputs[inputs.length - 1];
                if (last) last.querySelector('input').focus();
            }

            function removeCardRow(idx) {
                state.edit.cards.splice(idx, 1);
                if (!state.edit.cards.length) state.edit.cards.push({
                    id: uid(),
                    term: '',
                    def: ''
                });
                render();
            }

            async function saveSet() {
                const name = (state.edit.name || '').trim() || 'Untitled set';
                const cleanCards = state.edit.cards
                    .map(c => ({
                        id: c.id,
                        term: (c.term || '').trim(),
                        def: (c.def || '').trim()
                    }))
                    .filter(c => c.term && c.def);

                if (!cleanCards.length) {
                    state.importStatus = 'Add at least one card with both a term and a definition before saving.';
                    render();
                    return;
                }

                const validIds = new Set(cleanCards.map(c => c.id));
                const mastery = {};
                Object.keys(state.edit.mastery || {}).forEach(id => {
                    if (validIds.has(id)) mastery[id] = state.edit.mastery[id];
                });

                const id = state.edit.id || uid();
                const setObj = {
                    id,
                    name,
                    cards: cleanCards,
                    mastery
                };
                await saveSetData(setObj);

                const idx = state.sets.findIndex(s => s.id === id);
                const entry = {
                    id,
                    name,
                    count: cleanCards.length,
                    updatedAt: nowISO()
                };
                if (idx === -1) state.sets.push(entry);
                else state.sets[idx] = entry;
                await saveIndex(state.sets);

                state.edit = null;
                state.view = 'home';
                render();
            }

            /* ---------------- STUDY (flashcards) ---------------- */
            async function startStudy(id) {
                const data = await loadSetData(id);
                if (!data || !data.cards.length) return;
                state.study = {
                    setName: data.name,
                    order: shuffle(data.cards.map(c => c.id)),
                    cardsById: Object.fromEntries(data.cards.map(c => [c.id, c])),
                    index: 0,
                    flipped: false,
                    results: {}, // id -> 'know' | 'learning'
                    done: false,
                };
                state.view = 'study';
                render();
            }

            function renderStudy() {
                const st = state.study;
                const total = st.order.length;
                if (st.done) {
                    const known = Object.values(st.results).filter(r => r === 'know').length;
                    return topbarBack('study') +
                        '<h2 class="view-title">' + esc(st.setName) + ' — round complete</h2>' +
                        '<div class="stat-grid">' +
                        '<div class="stat"><div class="num">' + total + '</div><div class="lbl">cards</div></div>' +
                        '<div class="stat"><div class="num">' + known + '</div><div class="lbl">knew it</div></div>' +
                        '<div class="stat"><div class="num">' + (total - known) + '</div><div class="lbl">still learning</div></div>' +
                        '</div>' +
                        '<div class="row" style="justify-content:center;">' +
                        '<button class="btn btn-primary" data-action="study-again">Study again</button>' +
                        '<button class="btn btn-ghost" data-action="back-home">Back to sets</button>' +
                        '</div>';
                }

                const id = st.order[st.index];
                const card = st.cardsById[id];
                const ticks = st.order.map((cid, i) => {
                    let cls = '';
                    if (i < st.index) {
                        cls = st.results[cid] === 'know' ? 'lvl2' : 'bad';
                    }
                    return '<div class="tick ' + cls + '"></div>';
                }).join('');

                return topbarBack('study') +
                    '<h2 class="view-title">' + esc(st.setName) + '</h2>' +
                    '<div class="ruler" style="margin-bottom:4px;">' + ticks + '</div>' +
                    '<div class="ruler-label">Card ' + (st.index + 1) + ' of ' + total + '</div>' +
                    '<div class="flip-card' + (st.flipped ? ' flipped' : '') + '" data-action="flip-card">' +
                    '<div class="flip-card__inner">' +
                    '<div class="ruled flip-card__face">' +
                    '<div class="eyebrow">Term</div>' +
                    '<div class="flip-card__text">' + esc(card.term) + '</div>' +
                    '</div>' +
                    '<div class="ruled flip-card__face flip-card__face--back">' +
                    '<div class="eyebrow">Definition</div>' +
                    '<div class="flip-card__text">' + esc(card.def) + '</div>' +
                    '</div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="flip-hint">click the card to flip</div>' +
                    '<div class="row" style="justify-content:center; margin-top:18px;">' +
                    '<button class="btn btn-danger" data-action="mark-learning">Still learning</button>' +
                    '<button class="btn btn-primary" data-action="mark-know">Got it ✓</button>' +
                    '</div>';
            }

            function studyFlip() {
                state.study.flipped = !state.study.flipped;
                render();
            }

            function studyMark(result) {
                const st = state.study;
                const id = st.order[st.index];
                st.results[id] = result;
                st.flipped = false;
                if (st.index + 1 >= st.order.length) {
                    st.done = true;
                } else {
                    st.index++;
                }
                render();
            }

            function studyAgain() {
                const st = state.study;
                st.order = shuffle(st.order);
                st.index = 0;
                st.flipped = false;
                st.results = {};
                st.done = false;
                render();
            }

            /* ---------------- LEARN ---------------- */
            async function openLearn(id) {
                const data = await loadSetData(id);
                if (!data || !data.cards.length) return;
                state.learn = {
                    set: data,
                    levels: Object.fromEntries(data.cards.map(c => [c.id, (data.mastery && data.mastery[c.id]) || 0])),
                    direction: 'term2def',
                    phase: 'config',
                };
                state.view = 'learn';
                render();
            }

            function unmasteredIds() {
                const L = state.learn;
                const minTotal = L.set.cards.length;
                return L.set.cards.map(c => c.id).filter(id => L.levels[id] < (minTotal < 2 ? 1 : 2));
            }

            function startRound() {
                const L = state.learn;
                const remaining = unmasteredIds();
                if (!remaining.length) {
                    L.phase = 'all-mastered';
                    render();
                    return;
                }
                L.queue = shuffle(remaining);
                L.stats = {
                    asked: 0,
                    correctFirstTry: 0
                };
                L.startingCount = remaining.length;
                L.phase = 'active';
                pickNextQuestion();
            }

            function resolveDirection() {
                const L = state.learn;
                if (L.direction === 'mixed') return Math.random() < 0.5 ? 'term2def' : 'def2term';
                return L.direction;
            }

            function pickNextQuestion() {
                const L = state.learn;
                if (!L.queue.length) {
                    finishRound();
                    return;
                }
                const id = L.queue.shift();
                const card = L.set.cards.find(c => c.id === id);
                L.currentId = id;
                L.currentDir = resolveDirection();
                const totalCards = L.set.cards.length;
                const level = L.levels[id] || 0;
                const useMC = level === 0 && totalCards >= 2;
                L.currentMode = useMC ? 'mc' : 'recall';

                if (useMC) {
                    const isTerm2Def = L.currentDir === 'term2def';
                    const correctText = isTerm2Def ? card.def : card.term;
                    const others = L.set.cards.filter(c => c.id !== id);
                    const pool = shuffle(others).slice(0, Math.min(3, others.length));
                    const optionTexts = shuffle([correctText, ...pool.map(c => isTerm2Def ? c.def : c.term)]);
                    L.mcOptions = optionTexts.map(t => ({
                        text: t,
                        isCorrect: t === correctText
                    }));
                    // guard against accidental duplicate text marking two correct
                    let foundCorrect = false;
                    L.mcOptions = L.mcOptions.map(o => {
                        if (o.isCorrect && !foundCorrect) {
                            foundCorrect = true;
                            return o;
                        }
                        return {
                            text: o.text,
                            isCorrect: false
                        };
                    });
                    L.mcAnswered = null;
                } else {
                    L.recallRevealed = false;
                }
                render();
            }

            function chooseMC(idx) {
                const L = state.learn;
                if (L.mcAnswered) return;
                const opt = L.mcOptions[idx];
                L.mcAnswered = {
                    idx,
                    correct: opt.isCorrect
                };
                L.stats.asked++;
                if (opt.isCorrect) {
                    L.stats.correctFirstTry++;
                    L.levels[L.currentId] = Math.max(L.levels[L.currentId] || 0, 1);
                } else {
                    L.levels[L.currentId] = 0;
                    const insertAt = Math.min(3, L.queue.length);
                    L.queue.splice(insertAt, 0, L.currentId);
                }
                render();
            }

            function continueAfterMC() {
                pickNextQuestion();
            }

            function revealRecall() {
                state.learn.recallRevealed = true;
                render();
            }

            function gradeRecall(knewIt) {
                const L = state.learn;
                L.stats.asked++;
                if (knewIt) {
                    L.stats.correctFirstTry++;
                    L.levels[L.currentId] = 2;
                } else {
                    L.levels[L.currentId] = 0;
                    const insertAt = Math.min(3, L.queue.length);
                    L.queue.splice(insertAt, 0, L.currentId);
                }
                pickNextQuestion();
            }

            async function finishRound() {
                const L = state.learn;
                L.set.mastery = L.levels;
                await saveSetData(L.set);
                const idx = state.sets.findIndex(s => s.id === L.set.id);
                if (idx !== -1) {
                    state.sets[idx].updatedAt = nowISO();
                    await saveIndex(state.sets);
                }
                L.phase = 'round-summary';
                render();
            }

            async function resetSetProgress(id) {
                const data = await loadSetData(id);
                if (!data) return;
                data.mastery = {};
                await saveSetData(data);
                const idx = state.sets.findIndex(s => s.id === id);
                if (idx !== -1) {
                    state.sets[idx].updatedAt = nowISO();
                    await saveIndex(state.sets);
                }
                if (state.view === 'learn' && state.learn && state.learn.set.id === id) {
                    state.learn.levels = Object.fromEntries(data.cards.map(c => [c.id, 0]));
                    state.learn.phase = 'config';
                }
                state.confirmReset = null;
                render();
            }

            function topbarBack(view) {
                return '<div class="topbar"><div class="brand">INDEX</div>' +
                    '<button class="btn btn-ghost" data-action="learn-back-home">← Back to sets</button></div>';
            }

            function rulerBlock() {
                const L = state.learn;
                const ticks = L.set.cards.map(c => {
                    const lv = L.levels[c.id] || 0;
                    const cls = lv >= 2 ? 'lvl2' : (lv === 1 ? 'lvl1' : '');
                    return '<div class="tick ' + cls + '"></div>';
                }).join('');
                const m = (() => {
                    let l0 = 0,
                        l1 = 0,
                        l2 = 0;
                    L.set.cards.forEach(c => {
                        const lv = L.levels[c.id] || 0;
                        if (lv >= 2) l2++;
                        else if (lv === 1) l1++;
                        else l0++;
                    });
                    return {
                        l0,
                        l1,
                        l2
                    };
                })();
                return '<div class="ruler" style="margin:10px 0 2px;">' + ticks + '</div><div class="ruler-label">' + m.l2 + ' mastered · ' + m.l1 + ' learning · ' + m.l0 + ' new</div>';
            }

            function renderLearn() {
                const L = state.learn;
                const back = '<div class="topbar"><div class="brand">INDEX</div><button class="btn btn-ghost" data-action="learn-back-home">← Back to sets</button></div>';

                if (L.phase === 'config') {
                    const dirs = [
                        ['term2def', 'Term → Definition'],
                        ['def2term', 'Definition → Term'],
                        ['mixed', 'Mixed']
                    ];
                    return back +
                        '<h2 class="view-title">Learn — ' + esc(L.set.name) + '</h2>' +
                        '<div class="view-sub">' + L.set.cards.length + ' cards · multiple choice first, then a self-graded recall round.</div>' +
                        rulerBlock() +
                        '<div class="field" style="margin-top:22px;">' +
                        '<label>Study direction</label>' +
                        '<div class="radio-pills">' + dirs.map(d => '<button class="radio-pill' + (L.direction === d[0] ? ' active' : '') + '" data-action="set-direction" data-dir="' + d[0] + '">' + d[1] + '</button>').join('') + '</div>' +
                        '</div>' +
                        '<button class="btn btn-primary" data-action="start-round">Start</button>';
                }

                if (L.phase === 'all-mastered') {
                    const resetting = state.confirmReset === L.set.id;
                    return back +
                        '<div class="empty-state"><div class="big">🎉</div>' +
                        '<div>Every card in “' + esc(L.set.name) + '” is mastered.</div></div>' +
                        (resetting ?
                            '<div class="confirm-row" style="justify-content:center;">Wipe progress and start over? ' +
                            '<button class="btn btn-danger btn-sm" data-action="reset-confirm" data-id="' + L.set.id + '">Yes, reset</button>' +
                            '<button class="btn btn-ghost btn-sm" data-action="reset-cancel">Cancel</button></div>' :
                            '<div class="row" style="justify-content:center;"><button class="btn" data-action="reset-ask" data-id="' + L.set.id + '">Reset progress &amp; study again</button>' +
                            '<button class="btn btn-ghost" data-action="learn-back-home">Back to sets</button></div>'
                        );
                }

                if (L.phase === 'round-summary') {
                    const remaining = unmasteredIds().length;
                    return back +
                        '<h2 class="view-title">Round complete</h2>' +
                        rulerBlock() +
                        '<div class="stat-grid">' +
                        '<div class="stat"><div class="num">' + L.stats.asked + '</div><div class="lbl">answered</div></div>' +
                        '<div class="stat"><div class="num">' + L.stats.correctFirstTry + '</div><div class="lbl">correct</div></div>' +
                        '<div class="stat"><div class="num">' + remaining + '</div><div class="lbl">left to master</div></div>' +
                        '</div>' +
                        '<div class="row" style="justify-content:center;">' +
                        (remaining ? '<button class="btn btn-primary" data-action="start-round">Keep studying</button>' : '') +
                        '<button class="btn btn-ghost" data-action="learn-back-home">Back to sets</button>' +
                        '</div>';
                }

                // phase === 'active'
                const card = L.set.cards.find(c => c.id === L.currentId);
                const isTerm2Def = L.currentDir === 'term2def';
                const promptLabel = isTerm2Def ? 'Term' : 'Definition';
                const promptText = isTerm2Def ? card.term : card.def;
                const answerLabel = isTerm2Def ? 'Definition' : 'Term';
                const answerText = isTerm2Def ? card.def : card.term;

                let body;
                if (L.currentMode === 'mc') {
                    const answered = !!L.mcAnswered;
                    const opts = L.mcOptions.map((o, i) => {
                        let cls = '';
                        if (answered) {
                            if (o.isCorrect) cls = 'correct';
                            else if (L.mcAnswered.idx === i) cls = 'incorrect';
                        }
                        const letter = String.fromCharCode(65 + i);
                        return '<button class="option-btn ' + cls + '" data-action="mc-choose" data-idx="' + i + '" ' + (answered ? 'disabled' : '') + '>' +
                            '<span class="opt-letter">' + letter + '</span><span>' + esc(o.text) + '</span></button>';
                    }).join('');
                    body = '<div class="eyebrow" style="text-align:center;">Multiple choice — choose the matching ' + answerLabel.toLowerCase() + '</div>' +
                        '<div class="ruled prompt-card"><div class="eyebrow">' + promptLabel + '</div><div class="prompt-text">' + esc(promptText) + '</div></div>' +
                        '<div class="options-grid">' + opts + '</div>' +
                        (answered ? '<div class="feedback-banner ' + (L.mcAnswered.correct ? 'ok' : 'bad') + '" style="text-align:center;">' + (L.mcAnswered.correct ? 'Correct — on to the recall round for this card.' : 'Not quite — it\'ll come back around.') + '</div>' +
                            '<div class="row" style="justify-content:center; margin-top:14px;"><button class="btn btn-primary" data-action="continue-mc">Continue</button></div>' :
                            '');
                } else {
                    body = '<div class="eyebrow" style="text-align:center;">Recall — try to remember the ' + answerLabel.toLowerCase() + ', then check yourself</div>' +
                        '<div class="ruled prompt-card"><div class="eyebrow">' + promptLabel + '</div><div class="prompt-text">' + esc(promptText) + '</div></div>' +
                        (!L.recallRevealed ?
                            '<div class="row" style="justify-content:center; margin-top:14px;"><button class="btn btn-primary" data-action="reveal-recall">Show answer</button></div>' :
                            '<div class="answer-reveal"><div class="eyebrow">' + answerLabel + '</div>' + esc(answerText) + '</div>' +
                            '<div class="row" style="justify-content:center; margin-top:14px;">' +
                            '<button class="btn btn-danger" data-action="grade-recall" data-knew="0">Still learning</button>' +
                            '<button class="btn btn-primary" data-action="grade-recall" data-knew="1">I knew it ✓</button>' +
                            '</div>'
                        );
                }

                return back +
                    '<div class="ruler-label" style="text-align:center;">' + (L.startingCount - L.queue.length) + ' / ' + L.startingCount + ' this round</div>' +
                    body;
            }

            /* ---------------- navigation ---------------- */
            function backToHome() {
                state.edit = null;
                state.study = null;
                state.learn = null;
                state.confirmDelete = null;
                state.confirmReset = null;
                state.view = 'home';
                render();
            }
            async function learnBackHome() {
                if (state.learn && state.learn.phase === 'active') {
                    const L = state.learn;
                    L.set.mastery = L.levels;
                    await saveSetData(L.set);
                    const idx = state.sets.findIndex(s => s.id === L.set.id);
                    if (idx !== -1) {
                        state.sets[idx].updatedAt = nowISO();
                        await saveIndex(state.sets);
                    }
                }
                backToHome();
            }

            /* ---------------- events ---------------- */
            document.addEventListener('click', function(e) {
                const t = e.target.closest('[data-action]');
                if (!t) return;
                const action = t.dataset.action;
                const id = t.dataset.id;

                if (action === 'new-set') return startNewSet();
                if (action === 'edit-set') return startEditSet(id);
                if (action === 'delete-ask') {
                    state.confirmDelete = id;
                    state.confirmReset = null;
                    return render();
                }
                if (action === 'delete-cancel') {
                    state.confirmDelete = null;
                    return render();
                }
                if (action === 'delete-confirm') {
                    (async() => {
                        await deleteSetData(id);
                        state.sets = state.sets.filter(s => s.id !== id);
                        await saveIndex(state.sets);
                        state.confirmDelete = null;
                        render();
                    })();
                    return;
                }
                if (action === 'reset-ask') {
                    state.confirmReset = id;
                    state.confirmDelete = null;
                    return render();
                }
                if (action === 'reset-cancel') {
                    state.confirmReset = null;
                    return render();
                }
                if (action === 'reset-confirm') return resetSetProgress(id);

                if (action === 'study-set') return startStudy(id);
                if (action === 'learn-set') return openLearn(id);
                if (action === 'back-home') return backToHome();
                if (action === 'learn-back-home') return learnBackHome();

                // editor
                if (action === 'parse-import') return parseImport();
                if (action === 'add-card') return addCardRow();
                if (action === 'remove-card') return removeCardRow(parseInt(t.dataset.idx, 10));
                if (action === 'save-set') return saveSet();
                if (action === 'cancel-edit') return backToHome();

                // study
                if (action === 'flip-card') return studyFlip();
                if (action === 'mark-know') return studyMark('know');
                if (action === 'mark-learning') return studyMark('learning');
                if (action === 'study-again') return studyAgain();

                // learn
                if (action === 'set-direction') {
                    state.learn.direction = t.dataset.dir;
                    return render();
                }
                if (action === 'start-round') return startRound();
                if (action === 'mc-choose') return chooseMC(parseInt(t.dataset.idx, 10));
                if (action === 'continue-mc') return continueAfterMC();
                if (action === 'reveal-recall') return revealRecall();
                if (action === 'grade-recall') return gradeRecall(t.dataset.knew === '1');
            });

            document.addEventListener('input', function(e) {
                const t = e.target;
                if (!t.dataset || !state.edit) return;
                if (t.dataset.field === 'term') {
                    state.edit.cards[parseInt(t.dataset.idx, 10)].term = t.value;
                } else if (t.dataset.field === 'def') {
                    state.edit.cards[parseInt(t.dataset.idx, 10)].def = t.value;
                } else if (t.dataset.field === 'set-name') {
                    state.edit.name = t.value;
                }
            });

            /* ---------------- init ---------------- */
            (async function init() {
                try {
                    state.sets = await loadIndex();
                } catch (e) {
                    state.storageOk = false;
                    state.sets = [];
                }
                render();
            })();

        })();
    </script>
</body>

</html>
